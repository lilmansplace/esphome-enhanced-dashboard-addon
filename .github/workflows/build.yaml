name: Build add-on

on:
  push:
    branches: [main]
    paths:
      - 'esphome-enhanced-dashboard/**'
      - '.github/workflows/build.yaml'
  pull_request:
    paths:
      - 'esphome-enhanced-dashboard/**'
  workflow_dispatch:

env:
  ADDON_DIR: esphome-enhanced-dashboard
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: meta
        run: |
          VERSION=$(sed -n 's/^version:[[:space:]]*//p' "$ADDON_DIR/config.yaml" | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.ADDON_DIR }}
          file: ${{ env.ADDON_DIR }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_FROM=ghcr.io/esphome/esphome-hassio:2026.4.1
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.arch }}-esphome-enhanced-dashboard:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.arch }}-esphome-enhanced-dashboard:latest
          labels: |
            org.opencontainers.image.title=ESPHome Enhanced Dashboard (HA Add-on, ${{ matrix.arch }})
            org.opencontainers.image.source=https://github.com/heffneil/esphome-enhanced-dashboard-addon
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
